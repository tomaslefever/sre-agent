services:
  # Base de Datos Vectorial
  qdrant-db:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage

  # Observabilidad
  phoenix:
    image: arizephoenix/phoenix:latest

  # Base de Datos Relacional para Historial de Chat
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=agentx
      - POSTGRES_PASSWORD=supersecret
      - POSTGRES_DB=chat_history
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agentx -d chat_history" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # Nuestra Aplicación Streamlit
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - DATABASE_URL=postgresql://agentx:supersecret@postgres:5432/chat_history
      - QDRANT_URL=http://qdrant-db:6333
    depends_on:
      - qdrant-db
      - postgres
      - phoenix

volumes:
  qdrant_data:
  pg_data:
